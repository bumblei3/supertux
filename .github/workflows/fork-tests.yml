#
#  Fork-local CI: builds the wired unit tests and runs them (CTest).
#  Upstream's gnulinux.yml builds with BUILD_TESTING=OFF and never runs
#  tests, so this workflow is the regression safety net for the fork.

name: Fork CI - Build & Tests

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to avoid wasted minutes.
concurrency:
  group: fork-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-latest
    env:
      CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
      CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            ccache \
            build-essential \
            clang \
            libgtest-dev \
            libogg-dev \
            libvorbis-dev \
            libopenal-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libglib2.0-dev \
            libfreetype6-dev \
            libraqm-dev \
            libglew-dev \
            libglbinding-dev \
            libcurl4-openssl-dev \
            libglm-dev \
            libfmt-dev \
            libphysfs-dev \
            zlib1g-dev

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: fork-ci-ccache-${{ matrix.compiler }}-${{ github.sha }}
          restore-keys: |
            fork-ci-ccache-${{ matrix.compiler }}-

      - name: Configure
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build unit tests only
        run: |
          cmake --build build --target tests -j"$(nproc)"

      - name: Run unit tests
        working-directory: build
        run: |
          ctest --output-on-failure --output-junit tests.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-results-${{ matrix.compiler }}
          path: build/tests.xml
          if-no-files-found: ignore
