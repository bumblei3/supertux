#
#  Fork-local CI: builds the game and runs the wired unit tests (CTest).
#  Upstream's gnulinux.yml builds with BUILD_TESTING=OFF and does not run
#  any tests, so this workflow is the regression safety net for the fork.

name: Fork CI - Build & Tests

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            libgtest-dev \
            libogg-dev \
            libvorbis-dev \
            libopenal-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libglib2.0-dev \
            libfreetype6-dev \
            libraqm-dev \
            libglew-dev \
            libglbinding-dev \
            libcurl4-openssl-dev \
            libglm-dev \
            libfmt-dev \
            libphysfs-dev \
            zlib1g-dev

      - name: Configure
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build game and unit tests
        run: |
          cmake --build build -j"$(nproc)"
          cmake --build build --target tests -j"$(nproc)"

      - name: Run unit tests
        working-directory: build
        run: |
          ctest --output-on-failure
