#
#  Fork-local CI: builds the wired unit tests and runs them (CTest).
#  Upstream's gnulinux.yml builds with BUILD_TESTING=OFF and never runs
#  tests, so this workflow is the regression safety net for the fork.
#
#  Jobs:
#    build-and-test  GCC + Clang, Release, runs the full CTest suite.
#    sanitizers       GCC Debug + AddressSanitizer + UndefinedBehaviorSanitizer.
#    coverage         GCC Debug + gcov, aggregated with gcovr and uploaded.

name: Fork CI - Build & Tests

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to avoid wasted minutes.
concurrency:
  group: fork-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-26.04
    env:
      CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
      CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # Apply fork-only SDL3 submodule patches (SDL_ttf port) so a fresh
      # checkout reproduces the local build. See scripts/apply_submodule_patches.sh.
      - name: Apply submodule patches
        run: bash scripts/apply_submodule_patches.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            ccache \
            build-essential \
            clang \
            libgtest-dev \
            libogg-dev \
            libvorbis-dev \
            libopenal-dev \
            libsdl3-dev \
            libsdl3-image-dev \
            libglib2.0-dev \
            libfreetype6-dev \
            libraqm-dev \
            libglew-dev \
            libglbinding-dev \
            libcurl4-openssl-dev \
            libglm-dev \
            libfmt-dev \
            libphysfs-dev \
            zlib1g-dev

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: fork-ci-ccache-${{ matrix.compiler }}-${{ github.sha }}
          restore-keys: |
            fork-ci-ccache-${{ matrix.compiler }}-

      - name: Configure
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build unit tests only
        run: |
          cmake --build build --target tests -j"$(nproc)"

      - name: Run unit tests
        working-directory: build
        run: |
          # external/sexp-cpp is a vendored submodule whose test_sexp target has
          # 2 pre-existing failures unrelated to SuperTux (present on
          # upstream/master too). Run only SuperTux's own unit tests.
          ctest --output-on-failure -E 'test_sexp'

  sanitizers:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # Apply fork-only SDL3 submodule patches (SDL_ttf port) so a fresh
      # checkout reproduces the local build. See scripts/apply_submodule_patches.sh.
      - name: Apply submodule patches
        run: bash scripts/apply_submodule_patches.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            libgtest-dev \
            libogg-dev \
            libvorbis-dev \
            libopenal-dev \
            libsdl3-dev \
            libsdl3-image-dev \
            libglib2.0-dev \
            libfreetype6-dev \
            libraqm-dev \
            libglew-dev \
            libglbinding-dev \
            libcurl4-openssl-dev \
            libglm-dev \
            libfmt-dev \
            libphysfs-dev \
            zlib1g-dev

      - name: Configure (ASan + UBSan)
        run: |
          cmake -B build-san -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"

      - name: Build unit tests only
        run: |
          cmake --build build-san --target tests -j"$(nproc)"

      - name: Run unit tests under sanitizers
        working-directory: build-san
        run: |
          ctest --output-on-failure -E 'test_sexp'

  coverage:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # Apply fork-only SDL3 submodule patches (SDL_ttf port) so a fresh
      # checkout reproduces the local build. See scripts/apply_submodule_patches.sh.
      - name: Apply submodule patches
        run: bash scripts/apply_submodule_patches.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            libgtest-dev \
            libogg-dev \
            libvorbis-dev \
            libopenal-dev \
            libsdl3-dev \
            libsdl3-image-dev \
            libglib2.0-dev \
            libfreetype6-dev \
            libraqm-dev \
            libglew-dev \
            libglbinding-dev \
            libcurl4-openssl-dev \
            libglm-dev \
            libfmt-dev \
            libphysfs-dev \
            zlib1g-dev \
            python3-pip

      - name: Configure (gcov)
        run: |
          cmake -B build-cov -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_FLAGS="--coverage -fno-omit-frame-pointer"

      - name: Build unit tests only
        run: |
          cmake --build build-cov --target tests -j"$(nproc)"

      - name: Run unit tests
        working-directory: build-cov
        run: |
          ctest --output-on-failure -E 'test_sexp'

      - name: Aggregate coverage with gcovr
        run: |
          pip install --break-system-packages gcovr
          gcovr --object-directory build-cov \
                 --root . \
                 --filter 'src/.*' \
                 --print-summary \
                 --xml coverage.xml \
                 --html-details coverage.html \
                 || true

      - name: Enforce per-file coverage thresholds
        run: |
          python3 scripts/coverage_gate.py coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage.html
          if-no-files-found: ignore
