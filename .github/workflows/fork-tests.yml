#  the Free Software Foundation, either version 3 of the License, or
#  (at your option) any later version.
#
#  Fork-local CI: builds the wired unit tests and runs them (CTest).
#  Upstream's gnulinux.yml builds with BUILD_TESTING=OFF and never runs
#  tests, so this workflow is the regression safety net for the fork.
#
#  Jobs:
#    build-and-test  GCC + Clang, Release, runs the full CTest suite.
#    sanitizers       GCC Debug + AddressSanitizer + UndefinedBehaviorSanitizer.
#    coverage         GCC Debug + gcov, aggregated with gcovr and uploaded.

name: Fork CI - Build & Tests

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to avoid wasted minutes.
concurrency:
  group: fork-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-26.04
    env:
      CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
      CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # Apply fork-only SDL3 submodule patches (SDL_ttf port) so a fresh
      # checkout reproduces the local build. See scripts/apply_submodule_patches.sh.
      - name: Apply submodule patches
        run: bash scripts/apply_submodule_patches.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            ccache \
            build-essential \
            clang \
            libgtest-dev \
            libogg-dev \
            libvorbis-dev \
            libopenal-dev \
            libsdl3-dev \
            libsdl3-image-dev \
            libsdl3-ttf-dev \
            libglib2.0-dev \
            libfreetype6-dev \
            libraqm-dev \
            libglew-dev \
            libglbinding-dev \
            libcurl4-openssl-dev \
            libglm-dev \
            libfmt-dev \
            libphysfs-dev \
            zlib1g-dev \
            xvfb \
            scrot \
            imagemagick

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: fork-ci-ccache-${{ matrix.compiler }}-${{ github.sha }}
          restore-keys: |
            fork-ci-ccache-${{ matrix.compiler }}-

      - name: Configure
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build unit tests + game binary
        run: |
          cmake --build build --target tests supertux2 -j"$(nproc)"

      - name: Run unit tests
        working-directory: build
        run: |
          # external/sexp-cpp is a vendored submodule whose test_sexp target has
          # 2 pre-existing failures unrelated to SuperTux (present on
          # upstream/master too). Run only SuperTux's own unit tests.
          ctest --output-on-failure -E 'test_sexp'

      - name: Run E2E smoke + render tests
        working-directory: build
        run: |
          # Exercises the real supertux2 binary under xvfb: boots to menu,
          # asserts a clean exit, and (SmokeRenderPixels) that the captured
          # framebuffer is not black. Catches "runs but renders nothing"
          # regressions the unit tests (dummy SDL driver) cannot see.
          ctest --output-on-failure -R 'SmokeFullscreen|SmokeRenderPixels|SmokeLevelLoad|SmokeRendererChoice|SmokeGameplay'

  sanitizers:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # Apply fork-only SDL3 submodule patches (SDL_ttf port) so a fresh
      # checkout reproduces the local build. See scripts/apply_submodule_patches.sh.
      - name: Apply submodule patches
        run: bash scripts/apply_submodule_patches.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            libgtest-dev \
            libogg-dev \
            libvorbis-dev \
            libopenal-dev \
            libsdl3-dev \
            libsdl3-image-dev \
            libsdl3-ttf-dev \
            libglib2.0-dev \
            libfreetype6-dev \
            libraqm-dev \
            libglew-dev \
            libglbinding-dev \
            libcurl4-openssl-dev \
            libglm-dev \
            libfmt-dev \
            libphysfs-dev \
            zlib1g-dev

      - name: Configure (ASan + UBSan)
        run: |
          cmake -B build-san -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"

      - name: Build unit tests only
        run: |
          cmake --build build-san --target tests -j"$(nproc)"

      - name: Run unit tests under sanitizers
        working-directory: build-san
        run: |
          ctest --output-on-failure -E 'test_sexp'

  # E2E under AddressSanitizer. The unit-test sanitizer job above only
  # exercises code reachable from unit tests; the boot/fullscreen/render
  # path (where the SDL3 texture_manager use-after-free and the font-close
  # crash actually lived) is NOT covered by units. This job builds the
  # full supertux2 binary with ASan+UBSan and runs the E2E smoke tests
  # against it, so a heap corruption in the real startup/render path is
  # caught automatically. We disable leak detection because the E2E tests
  # SIGTERM the game mid-run (not a clean teardown), which would otherwise
  # report benign "leaks" on exit.
  sanitizers-e2e:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Apply submodule patches
        run: bash scripts/apply_submodule_patches.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            libgtest-dev \
            libogg-dev \
            libvorbis-dev \
            libopenal-dev \
            libsdl3-dev \
            libsdl3-image-dev \
            libsdl3-ttf-dev \
            libglib2.0-dev \
            libfreetype6-dev \
            libraqm-dev \
            libglew-dev \
            libglbinding-dev \
            libcurl4-openssl-dev \
            libglm-dev \
            libfmt-dev \
            libphysfs-dev \
            zlib1g-dev \
            xvfb \
            scrot \
            imagemagick

      - name: Configure (ASan + UBSan)
        run: |
          cmake -B build-san-e2e -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"

      - name: Build supertux2 (ASan)
        run: |
          cmake --build build-san-e2e --target supertux2 -j"$(nproc)"

      - name: Configure & build E2E test harness
        working-directory: build-san-e2e
        run: |
          cmake --build . --target tests -j"$(nproc)"

      - name: Run E2E smoke + render + level-load + renderer-choice tests under ASan
        working-directory: build-san-e2e
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: |
          ctest --output-on-failure -R 'SmokeFullscreen|SmokeRenderPixels|SmokeLevelLoad|SmokeRendererChoice|SmokeGameplay'

  # Static analysis with clang-tidy. Catches undefined-behaviour classes
  # (null/optional dereference, bad pointer arithmetic) across the WHOLE
  # codebase -- not just the code paths the E2E/sanitizer tests happen to
  # exercise. The .clang-tidy config only promotes the hard-UB checks to
  # errors; everything else is reported. This job reports (exit 0) and
  # uploads the findings as an artifact so the count is trackable without
  # breaking CI on pre-existing warnings; promote more checks to
  # WarningsAsErrors as the code is cleaned up.
  clang-tidy:
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          # clean:false -- the post-job "git clean"/submodule-reset was
          # observed to HANG the run (stuck in "Post Run actions/checkout",
          # run never finalizes, logs locked) across runs 29657961381 /
          # 29659640902. We need the submodules for `cmake -B build-tidy`
          # (SuperTux's CMakeLists references external/SDL_ttf), so we
          # cannot drop them -- instead we skip the post-job cleanup that
          # hung. timeout-minutes:30 ensures any future hang terminates
          # cleanly instead of wedging the run.
          clean: false

      - name: Apply submodule patches
        run: bash scripts/apply_submodule_patches.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential clang-tidy \
            libgtest-dev libogg-dev libvorbis-dev libopenal-dev \
            libsdl3-dev libsdl3-image-dev libsdl3-ttf-dev \
            libglib2.0-dev libfreetype6-dev libraqm-dev libglew-dev \
            libglbinding-dev libcurl4-openssl-dev libglm-dev libfmt-dev \
            libphysfs-dev zlib1g-dev

      - name: Configure (export compile commands)
        run: |
          cmake -B build-tidy -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy (report-only)
        run: |
          # -P 2 (not nproc) to avoid OOM on shared CI runners with many
          # parallel clang-tidy processes over the whole src/ tree.
          find src -name '*.cpp' -print0 \
            | xargs -0 -P 2 clang-tidy -p build-tidy \
            > tidy-report.txt 2>&1 || true
          echo "clang-tidy finished (report-only)"
          UB=$(grep -c "error:" tidy-report.txt); echo "UB-error count: $UB"
          WARN=$(grep -c "warning:" tidy-report.txt); echo "warning count: $WARN"
          # Surface the hard-UB errors (the checks promoted to errors in
          # .clang-tidy) directly in the log so the result is visible without
          # downloading the artifact.
          echo "--- hard-UB error lines (if any) ---"
          grep -E "error: .*(unchecked-optional-access|nullptr-arithmetic|NullDereference|CallAndMessage|NewDelete)" tidy-report.txt | head -20 || true

      - name: Upload tidy report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: tidy-report.txt
          if-no-files-found: ignore

  coverage:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # Apply fork-only SDL3 submodule patches (SDL_ttf port) so a fresh
      # checkout reproduces the local build. See scripts/apply_submodule_patches.sh.
      - name: Apply submodule patches
        run: bash scripts/apply_submodule_patches.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            libgtest-dev \
            libogg-dev \
            libvorbis-dev \
            libopenal-dev \
            libsdl3-dev \
            libsdl3-image-dev \
            libsdl3-ttf-dev \
            libglib2.0-dev \
            libfreetype6-dev \
            libraqm-dev \
            libglew-dev \
            libglbinding-dev \
            libcurl4-openssl-dev \
            libglm-dev \
            libfmt-dev \
            libphysfs-dev \
            zlib1g-dev \
            python3-pip

      - name: Configure (gcov)
        run: |
          cmake -B build-cov -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_FLAGS="--coverage -fno-omit-frame-pointer"

      - name: Build unit tests only
        run: |
          cmake --build build-cov --target tests -j"$(nproc)"

      - name: Run unit tests
        working-directory: build-cov
        run: |
          ctest --output-on-failure -E 'test_sexp'

      - name: Aggregate coverage with gcovr
        run: |
          pip install --break-system-packages gcovr
          gcovr --object-directory build-cov \
                 --root . \
                 --filter 'src/.*' \
                 --print-summary \
                 --xml coverage.xml \
                 --html-details coverage.html \
                 || true

      - name: Enforce per-file coverage thresholds
        run: |
          python3 scripts/coverage_gate.py coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage.html
          if-no-files-found: ignore
