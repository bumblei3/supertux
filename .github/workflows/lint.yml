name: Code Linting

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - '*'
    paths:
      - 'src/**'
  pull_request:
    paths:
      - 'src/**'

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Cppcheck from the distribution package. The previous approach
      # resolved the tarball URL via the GitHub API, which is rate-limited and
      # returns an HTML error page that breaks `tar` ("gzip: stdin: unexpected
      # end of file"). Ubuntu noble ships cppcheck 2.13, which supports
      # --check-level=exhaustive, so the self-built tarball is no longer needed.
      - name: Install Cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --version

      - name: Lint code with Cppcheck
        run: |
          cppcheck \
            --check-level=exhaustive --include=mk/cppcheck/include/SDL.h \
            --quiet --inline-suppr --language=c++ --error-exitcode=10 \
            -j"$(nproc)" --std=c++17 --enable=warning,style \
            --suppress=useStlAlgorithm -U__EMSCRIPTEN__ -UDOXYGEN_SCRIPTING src/
